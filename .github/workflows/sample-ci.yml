name: sample-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sample-backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve project directory
        run: |
          PROJECT_DIR="$(find . -maxdepth 2 -name requirements.txt -printf '%h\n' | head -n1)"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd "$PROJECT_DIR"
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sample/logistics tests
        run: |
          cd "$PROJECT_DIR"
          pytest -q server/tests/test_sample_routes.py server/tests/test_logistics.py

  sample-frontend-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve project directory
        run: |
          PROJECT_DIR="$(find . -maxdepth 2 -name requirements.txt -printf '%h\n' | head -n1)"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check key mini program scripts
        run: |
          cd "$PROJECT_DIR"
          node --check miniprogram/pages/sample/sample.js
          node --check miniprogram/pages/fabric/detail/detail.js
